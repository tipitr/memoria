<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MOMENTUM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0a08; color: #e6d8c0; font-family: 'Iowan Old Style', Georgia, serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: none; }
  canvas { display: block; position: fixed; inset: 0; }

  /* Subtle vignette overlay (paired with shader vignette for depth) */
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 100%);
    pointer-events: none; z-index: 4;
  }

  /* Companion whisper line */
  #whisper {
    position: fixed; left: 50%; bottom: 18vh; transform: translateX(-50%);
    font-size: clamp(14px, 2vw, 17px); letter-spacing: 0.04em;
    color: #e6d8c0; opacity: 0; transition: opacity 1.6s ease;
    font-style: italic; text-shadow: 0 0 18px rgba(230,184,111,0.25);
    pointer-events: none; z-index: 5;
    text-align: center; max-width: 80vw;
  }
  #whisper.show { opacity: 0.85; }

  /* Tap ripple — visual confirmation that the tap registered */
  .tap-ripple {
    position: fixed; width: 80px; height: 80px;
    border-radius: 50%; pointer-events: none; z-index: 7;
    border: 1px solid rgba(245, 216, 154, 0.55);
    transform: translate(-50%, -50%) scale(0.2);
    animation: ripple 700ms ease-out forwards;
  }
  @keyframes ripple {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0.8; border-width: 2px; }
    100% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; border-width: 1px; }
  }

  /* Quest action pills — appear under whisper when tiny quest is delivered */
  #quest-actions {
    position: fixed; left: 50%; bottom: 9vh; transform: translateX(-50%);
    display: flex; gap: 14px;
    opacity: 0; pointer-events: none; z-index: 6;
    transition: opacity 0.9s ease;
  }
  #quest-actions.show { opacity: 1; pointer-events: auto; }
  #quest-actions button {
    appearance: none; background: rgba(20, 14, 10, 0.55);
    border: 1px solid rgba(230, 216, 192, 0.22);
    color: #e6d8c0;
    font-family: inherit; font-style: italic; font-size: 13px;
    letter-spacing: 0.15em; padding: 10px 22px;
    border-radius: 999px; cursor: pointer;
    transition: background 0.4s ease, border-color 0.4s ease, color 0.4s ease;
    -webkit-tap-highlight-color: transparent;
  }
  #quest-actions button.done {
    color: #f5d89a; border-color: rgba(245, 216, 154, 0.45);
  }
  #quest-actions button.done:hover { background: rgba(245, 216, 154, 0.12); }
  #quest-actions button.skip { color: #8a8378; }
  #quest-actions button.skip:hover { background: rgba(255,255,255,0.04); }

  #room-hint {
    position: fixed; left: 50%; top: 7vh; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
    color: rgba(230,216,192,0.72);
    font-size: clamp(13px, 2vw, 16px);
    font-style: italic; letter-spacing: 0.05em;
    text-align: center; max-width: 84vw;
    text-shadow: 0 0 18px rgba(245,216,154,0.28);
    opacity: 0; transition: opacity 1.2s ease, transform 1.2s ease;
  }
  #room-hint.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #room-task {
    position: fixed; left: 50%; top: 6vh; transform: translateX(-50%);
    z-index: 6; pointer-events: none;
    min-width: min(340px, 86vw);
    padding: 12px 18px;
    border-radius: 18px;
    background: rgba(16, 11, 8, 0.48);
    border: 1px solid rgba(230, 216, 192, 0.16);
    box-shadow: 0 12px 34px rgba(0,0,0,0.22), 0 0 30px rgba(245,216,154,0.08);
    opacity: 0; transition: opacity 900ms ease, transform 900ms ease;
    text-align: center; backdrop-filter: blur(8px);
  }
  #room-task.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #room-task .need {
    display: block;
    color: #f5d89a;
    font-size: clamp(15px, 2.4vw, 18px);
    font-style: italic; letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  #room-task .how {
    display: block;
    color: rgba(230,216,192,0.68);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .target-label {
    position: fixed; z-index: 6; pointer-events: none;
    transform: translate(-50%, -50%);
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(10,7,5,0.52);
    border: 1px solid rgba(230,216,192,0.15);
    color: rgba(230,216,192,0.55);
    font-size: 11px; font-style: italic; letter-spacing: 0.08em;
    opacity: 0.45; transition: opacity 300ms ease, color 300ms ease, border-color 300ms ease, transform 300ms ease;
  }
  .target-label.active {
    opacity: 1;
    color: #f5d89a;
    border-color: rgba(245,216,154,0.45);
    transform: translate(-50%, -50%) scale(1.08);
    box-shadow: 0 0 24px rgba(245,216,154,0.16);
  }

  /* Title — three softly fading screens, then dissolves into the room */
  #onboard {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0d0a08;
    padding: 0 8vw;
    transition: opacity 1.8s ease;
  }
  #onboard.fade { opacity: 0; pointer-events: none; }
  #onboard .lines { text-align: center; max-width: 540px; }
  #onboard .line {
    display: block;
    font-size: clamp(16px, 2.4vw, 21px); line-height: 1.7;
    color: #e6d8c0; opacity: 0; margin: 0.4em 0;
    transition: opacity 1.4s ease, transform 1.4s ease;
    transform: translateY(6px);
    font-style: italic;
  }
  #onboard .line.in { opacity: 0.9; transform: translateY(0); }
  #onboard .line.title {
    font-style: normal;
    font-size: clamp(28px, 5vw, 44px);
    letter-spacing: 0.4em; color: #f5d89a;
    margin-bottom: 2em;
    text-shadow: 0 0 24px rgba(245,216,154,0.35);
  }
  #onboard .cta {
    margin-top: 3.5em;
    font-size: 12px; letter-spacing: 0.35em; color: #8a7a64;
    opacity: 0; transition: opacity 1.2s ease;
    animation: breathe 2.2s ease-in-out infinite;
  }
  #onboard .cta.in { opacity: 0.8; }
  @keyframes breathe { 0%,100% { opacity: 0.45; } 50% { opacity: 0.95; } }
</style>
</head>
<body>

<div id="onboard">
  <div class="lines" id="onboard-lines"></div>
  <div class="cta" id="onboard-cta">— tap —</div>
</div>

<div id="vignette"></div>
<div id="room-hint">pull one drifting thing into the lamp, plant, or window.</div>
<div id="room-task">
  <span class="need" id="task-need">the lamp is dim.</span>
  <span class="how" id="task-how">tap any wisp, or drag one to the lamp.</span>
</div>
<div class="target-label" id="label-lamp">lamp</div>
<div class="target-label" id="label-plant">plant</div>
<div class="target-label" id="label-window">window</div>
<div id="whisper"></div>
<div id="quest-actions">
  <button class="done" id="quest-done">tiny step</button>
  <button class="skip" id="quest-skip">not now</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
<script>
/* ============================================================
   MOMENTUM v0.1 — The Room
   A cozy bedroom-studio. Warm lamp, rain on the window, a small
   companion drifting near the desk. No interaction yet — just
   be here for a minute and see if the room knows you.
   ============================================================ */

// ===== Onboarding (3 quiet screens, then we're in the room) =====
const ONBOARD = [
  [
    { text: 'MOMENTUM', title: true },
    { text: 'this is a room.' },
    { text: "it's warm." },
  ],
  [
    { text: 'when something is heavy,' },
    { text: 'gather a wisp.' },
    { text: 'a tiny first step will appear.' },
  ],
  [
    { text: 'then leave.' },
    { text: 'live a little.' },
    { text: 'come back whenever.' },
  ],
];

let onboardScreen = 0;
function showOnboardScreen(i) {
  const lines = document.getElementById('onboard-lines');
  const cta = document.getElementById('onboard-cta');
  lines.innerHTML = '';
  cta.classList.remove('in');
  ONBOARD[i].forEach((entry) => {
    const div = document.createElement('div');
    div.className = 'line';
    if (entry.title) div.classList.add('title');
    div.textContent = entry.text;
    lines.appendChild(div);
  });
  const lineEls = lines.querySelectorAll('.line');
  lineEls.forEach((el, n) => setTimeout(() => el.classList.add('in'), 500 + n * 800));
  setTimeout(() => cta.classList.add('in'), 500 + lineEls.length * 800 + 600);
}
// v0.4: no pre-game reading. The room is the first screen.
document.getElementById('onboard').classList.add('fade');
setTimeout(enterRoom, 350);

// ===== Three.js — the room =====
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0e0a08, 0.075);
scene.background = new THREE.Color(0x0e0a08);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 60);
// Camera looks INTO the room from a slightly-elevated south position
camera.position.set(0, 1.85, 5.5);
camera.lookAt(0, 1.4, -2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ===== Lighting =====
// Very low ambient — almost everything comes from the lamp + window
scene.add(new THREE.AmbientLight(0x3a2a1a, 0.35));

// Warm lamp — main light source, on the desk
const lampLight = new THREE.PointLight(0xffb066, 1.6, 10, 1.9);
lampLight.position.set(1.3, 1.75, -2.2);
lampLight.castShadow = true;
lampLight.shadow.mapSize.set(512, 512);
lampLight.shadow.bias = -0.001;
scene.add(lampLight);

// Cool moonlight through the window — wide soft fill
const moonLight = new THREE.DirectionalLight(0x6d8db0, 0.5);
moonLight.position.set(-3, 4, -4);
scene.add(moonLight);

// Subtle warm hemisphere for floor bounce
const hemi = new THREE.HemisphereLight(0xffaa66, 0x1a0e08, 0.25);
scene.add(hemi);

// ===== Room geometry =====
const ROOM = new THREE.Group();
scene.add(ROOM);

// Materials — all flat-shaded for low-poly look
const woodMat = new THREE.MeshStandardMaterial({
  color: 0x4a2c1a, roughness: 0.85, metalness: 0.0, flatShading: true,
});
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x3a2e22, roughness: 0.95, metalness: 0.0, flatShading: true,
});
const ceilMat = new THREE.MeshStandardMaterial({
  color: 0x1f1812, roughness: 1.0, metalness: 0.0, flatShading: true,
});
const fabricMat = new THREE.MeshStandardMaterial({
  color: 0x6a4a32, roughness: 0.9, metalness: 0.0, flatShading: true,
});
const metalMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a, roughness: 0.4, metalness: 0.7, flatShading: true,
});
const lampShadeMat = new THREE.MeshStandardMaterial({
  color: 0xd89a60, roughness: 0.65, metalness: 0.0,
  emissive: 0xffaa66, emissiveIntensity: 0.55,
  transparent: true, opacity: 0.95, flatShading: true,
});
const plantPotMat = new THREE.MeshStandardMaterial({
  color: 0x5a3826, roughness: 0.9, metalness: 0.0, flatShading: true,
});
const leafMat = new THREE.MeshStandardMaterial({
  color: 0x3a5230, roughness: 0.8, metalness: 0.0, flatShading: true,
});
const leafLightMat = new THREE.MeshStandardMaterial({
  color: 0x4a6238, roughness: 0.8, metalness: 0.0, flatShading: true,
});
const glassMat = new THREE.MeshStandardMaterial({
  color: 0x1a2230, roughness: 0.1, metalness: 0.0,
  transparent: true, opacity: 0.55, flatShading: true,
});

// Floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  woodMat
);
floor.rotation.x = -Math.PI/2;
floor.position.y = 0;
floor.receiveShadow = true;
ROOM.add(floor);

// Subtle floor planks — emissive lines for plank seams
for (let i = -2; i <= 2; i++) {
  const seam = new THREE.Mesh(
    new THREE.BoxGeometry(10, 0.02, 0.02),
    new THREE.MeshBasicMaterial({ color: 0x1a0e08, transparent: true, opacity: 0.6 })
  );
  seam.position.set(0, 0.011, i * 0.9);
  ROOM.add(seam);
}

// Back wall (with window cutout — we'll build it as 4 pieces around the window)
function makeWall(width, height, depth, x, y, z, mat, rotY = 0) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), mat);
  w.position.set(x, y, z);
  w.rotation.y = rotY;
  w.receiveShadow = true;
  ROOM.add(w);
  return w;
}

// Back wall pieces (window is 1.8w × 1.6h, centered at x=-1.4, y=1.8)
const BACK_Z = -3.5;
// Window position
const WIN_X = -1.4, WIN_Y = 1.8, WIN_W = 1.8, WIN_H = 1.6;

// Left of window
makeWall(10/2 - 0.9, 3.6, 0.1, -3.6, 1.8, BACK_Z, wallMat);
// Right of window (extends far right of room)
makeWall(10/2 + 0.9, 3.6, 0.1,  1.5, 1.8, BACK_Z, wallMat);
// Above window
makeWall(WIN_W, 3.6 - WIN_H - 0.4, 0.1, WIN_X, 1.8 + WIN_H/2 + (3.6 - WIN_H - 0.4)/2 - 0.2, BACK_Z, wallMat);
// Below window (sill area)
makeWall(WIN_W, 1.8 - WIN_H/2 - 0.5, 0.1, WIN_X, (1.8 - WIN_H/2 - 0.5)/2, BACK_Z, wallMat);

// Window glass
const glass = new THREE.Mesh(new THREE.PlaneGeometry(WIN_W, WIN_H), glassMat);
glass.position.set(WIN_X, WIN_Y, BACK_Z + 0.01);
ROOM.add(glass);

// Window frame
const frameMat = new THREE.MeshStandardMaterial({ color: 0x281b10, roughness: 0.9 });
for (const part of [
  [WIN_W + 0.1, 0.08, 0.06, WIN_X, WIN_Y + WIN_H/2, BACK_Z + 0.05], // top
  [WIN_W + 0.1, 0.08, 0.06, WIN_X, WIN_Y - WIN_H/2, BACK_Z + 0.05], // bottom
  [0.08, WIN_H, 0.06, WIN_X - WIN_W/2, WIN_Y, BACK_Z + 0.05],       // left
  [0.08, WIN_H, 0.06, WIN_X + WIN_W/2, WIN_Y, BACK_Z + 0.05],       // right
  [WIN_W, 0.05, 0.06, WIN_X, WIN_Y, BACK_Z + 0.05],                 // horizontal mullion
  [0.05, WIN_H, 0.06, WIN_X, WIN_Y, BACK_Z + 0.05],                 // vertical mullion
]) {
  const [w, h, d, x, y, z] = part;
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), frameMat);
  m.position.set(x, y, z);
  ROOM.add(m);
}

// Window sill (small shelf below window)
const sill = new THREE.Mesh(
  new THREE.BoxGeometry(WIN_W + 0.3, 0.06, 0.25),
  frameMat
);
sill.position.set(WIN_X, WIN_Y - WIN_H/2 - 0.05, BACK_Z + 0.18);
ROOM.add(sill);

// Left wall
makeWall(0.1, 3.6, 8, -5, 1.8, 0, wallMat);
// Right wall
makeWall(0.1, 3.6, 8,  5, 1.8, 0, wallMat);

// Ceiling
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), ceilMat);
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 3.6;
ROOM.add(ceiling);

// ===== Desk =====
const desk = new THREE.Group();
desk.position.set(1.3, 0, -2.6);
ROOM.add(desk);

// Desk top
const deskTop = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.08, 1.0), woodMat);
deskTop.position.y = 1.05;
deskTop.castShadow = true;
deskTop.receiveShadow = true;
desk.add(deskTop);
// Desk legs (4)
for (const [lx, lz] of [[-0.9, -0.45], [0.9, -0.45], [-0.9, 0.45], [0.9, 0.45]]) {
  const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.05, 0.08), woodMat);
  leg.position.set(lx, 0.525, lz);
  desk.add(leg);
}

// ===== Lamp on desk =====
const lamp = new THREE.Group();
lamp.position.set(0.4, 1.09, -0.1);
desk.add(lamp);
// Base — chunky low-poly hexagon
const lampBase = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.06, 6), metalMat);
lampBase.position.y = 0.03;
lamp.add(lampBase);
// Stem — 4-sided so it reads as low-poly even thin
const lampStem = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.55, 4), metalMat);
lampStem.position.y = 0.33;
lamp.add(lampStem);
// Shade — 6-sided cone, very low poly
const lampShade = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.32, 6, 1, true), lampShadeMat);
lampShade.position.y = 0.66;
lampShade.material.side = THREE.DoubleSide;
lamp.add(lampShade);

// ===== Plant on desk =====
const plant = new THREE.Group();
plant.position.set(-0.7, 1.09, 0.05);
desk.add(plant);
// Pot — hexagonal, low-poly
const pot = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.10, 0.18, 6), plantPotMat);
pot.position.y = 0.09;
plant.add(pot);
// Leaves — angular tetrahedron-style chunks for true low-poly look
const plantLeaves = [];
for (let i = 0; i < 7; i++) {
  const angle = (i/7) * Math.PI*2;
  const r = 0.06 + Math.random()*0.08;
  // Use a low-poly stretched icosahedron for leaf
  const leafGeo = new THREE.IcosahedronGeometry(0.12, 0);
  leafGeo.scale(0.4, 1.5, 0.35);
  const leaf = new THREE.Mesh(leafGeo, i % 2 ? leafMat : leafLightMat);
  leaf.position.set(Math.cos(angle)*r, 0.28 + Math.random()*0.12, Math.sin(angle)*r);
  leaf.rotation.set(
    (Math.random()-0.5)*0.5,
    angle + Math.random()*0.3,
    (Math.random()-0.3)*0.6
  );
  plant.add(leaf);
  plantLeaves.push(leaf);
}

// ===== Bed/couch on the left =====
const bed = new THREE.Group();
bed.position.set(-3, 0, -1.8);
ROOM.add(bed);
// Base
const bedBase = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.4, 2.6), woodMat);
bedBase.position.y = 0.2;
bedBase.castShadow = true;
bedBase.receiveShadow = true;
bed.add(bedBase);
// Mattress / blankets
const mattress = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.22, 2.55), fabricMat);
mattress.position.y = 0.51;
mattress.castShadow = true;
bed.add(mattress);
// Pillow
const pillow = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.15, 0.55), new THREE.MeshStandardMaterial({ color: 0xc8a880, roughness: 0.9 }));
pillow.position.set(0, 0.7, -0.85);
bed.add(pillow);
// Folded blanket at foot
const blanket = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.12, 0.7), new THREE.MeshStandardMaterial({ color: 0x8a4a32, roughness: 0.9 }));
blanket.position.set(0, 0.66, 0.85);
bed.add(blanket);

// Small rug between bed and desk
const rugGeo = new THREE.PlaneGeometry(2.2, 1.3);
const rugMat = new THREE.MeshStandardMaterial({
  color: 0x7a4a30, roughness: 1.0, metalness: 0.0
});
const rug = new THREE.Mesh(rugGeo, rugMat);
rug.rotation.x = -Math.PI/2;
rug.position.set(-0.5, 0.005, -0.6);
rug.receiveShadow = true;
ROOM.add(rug);

// ===== Companion — small floating spirit =====
const companion = new THREE.Group();
// Core
const compColor = new THREE.Color(0xf5d89a);
const compCore = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.12, 1),
  new THREE.MeshStandardMaterial({
    color: compColor, emissive: compColor, emissiveIntensity: 2.0, roughness: 0.4
  })
);
companion.add(compCore);
// Inner glow shell
const compInner = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.22, 1),
  new THREE.MeshBasicMaterial({ color: compColor, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending, depthWrite: false })
);
companion.add(compInner);
// Outer glow
const compOuter = new THREE.Mesh(
  new THREE.IcosahedronGeometry(0.4, 1),
  new THREE.MeshBasicMaterial({ color: compColor, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending, depthWrite: false })
);
companion.add(compOuter);
// Sprite halo
const cnv = document.createElement('canvas');
cnv.width = cnv.height = 128;
const ctx = cnv.getContext('2d');
const grad = ctx.createRadialGradient(64,64,4,64,64,64);
grad.addColorStop(0, 'rgba(245,216,154,0.95)');
grad.addColorStop(0.4, 'rgba(245,216,154,0.25)');
grad.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
const compHalo = new THREE.Sprite(new THREE.SpriteMaterial({
  map: new THREE.CanvasTexture(cnv), transparent: true, opacity: 0.6,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
compHalo.scale.set(1.2, 1.2, 1);
companion.add(compHalo);
// Tiny point light from companion
const compLight = new THREE.PointLight(0xf5d89a, 0.5, 4, 2);
companion.add(compLight);

companion.position.set(0.4, 1.5, -1.5);

function makeWisp(x, y, z, colorHex) {
  // Visual — bigger, more visible, clearly interactive
  const group = new THREE.Group();
  const color = new THREE.Color(colorHex);
  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.1, 0),
    new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 3.0,
      roughness: 0.4, flatShading: true,
    })
  );
  group.add(core);
  const glow = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.22, 0),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.5,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  group.add(glow);
  const halo = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.45, 0),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.18,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  group.add(halo);
  // INVISIBLE generous hitbox — radius ~1.1 units, never rendered.
  // This is what the raycaster hits so tapping is forgiving.
  const hitbox = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 8, 6),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  hitbox.userData.isHitbox = true;
  group.add(hitbox);
  // Tiny point light so wisp casts a soft colored glow on nearby surfaces
  const wispLight = new THREE.PointLight(color, 0.4, 2.2, 2);
  group.add(wispLight);
  group.position.set(x, y, z);
  scene.add(group);

  // Physics — sphere body, very low mass, high damping for soft float
  const body = new CANNON.Body({
    mass: 0.04,
    material: wispMat,
    shape: new CANNON.Sphere(0.1),
    position: new CANNON.Vec3(x, y, z),
    linearDamping: 0.75,
    angularDamping: 0.9,
  });
  // Slight initial drift
  body.velocity.set(
    (Math.random() - 0.5) * 0.3,
    (Math.random() - 0.2) * 0.2,
    (Math.random() - 0.5) * 0.3
  );
  world.addBody(body);

  const wisp = { group, body, color, phase: Math.random()*Math.PI*2, baseY: y };
  wisps.push(wisp);
  return wisp;
}

// Project a 3D point to 2D screen pixels
const _projVec = new THREE.Vector3();
function projectToScreen(pos3) {
  _projVec.copy(pos3).project(camera);
  return {
    x: (_projVec.x * 0.5 + 0.5) * window.innerWidth,
    y: (-_projVec.y * 0.5 + 0.5) * window.innerHeight,
    z: _projVec.z,  // <1 = in front of camera
  };
}

function chooseWispAt(x, y) {
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hitboxes = wisps.map(w => w.group.children.find(c => c.userData && c.userData.isHitbox)).filter(Boolean);
  const hits = raycaster.intersectObjects(hitboxes, false);
  let chosen = null;
  if (hits.length > 0) {
    chosen = wisps.find(w => w.group.children.includes(hits[0].object));
  }

  // Fallback: 2D screen-space — find nearest wisp within 140px of tap
  if (!chosen) {
    let bestDist = 140;
    for (const w of wisps) {
      const sp = projectToScreen(w.group.position);
      if (sp.z > 1) continue;  // behind camera
      const dx = sp.x - x, dy = sp.y - y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < bestDist) { bestDist = d; chosen = w; }
    }
  }
  return chosen;
}

function targetAtScreen(x, y) {
  let best = null;
  let bestDist = 150;
  for (const target of targetZones) {
    const sp = projectToScreen(target.pos);
    if (sp.z > 1) continue;
    const dx = sp.x - x, dy = sp.y - y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < bestDist) { bestDist = d; best = target; }
  }
  return best;
}

function updateDragPoint(x, y) {
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(dragPlane, hit)) {
    dragPoint = hit;
  }
}

function setActiveTarget(target) {
  activeTarget = target;
  targetZones.forEach((t) => {
    const isActive = t === target || (!target && t === currentWish);
    t.halo.material.opacity = isActive ? t.halo.userData.activeOpacity : t.halo.userData.baseOpacity;
    t.halo.scale.setScalar(isActive ? 1.25 : 1);
  });
}

function setCurrentWish(target) {

function nextWishAfter(target) {

  const next = remaining[Math.floor(Math.random() * remaining.length)];

function updateTargetLabels() {
  targetZones.forEach((target) => {
    const el = document.getElementById('label-' + target.name);
    if (!el) return;
    const sp = projectToScreen(target.pos);
    el.style.left = sp.x + 'px';
    el.style.top = sp.y + 'px';
    el.style.display = sp.z < 1 ? 'block' : 'none';
    el.classList.toggle('active', target === activeTarget || target === currentWish);
    el.textContent = target === currentWish ? target.label + ' wants this' : target.label;
  });
}

window.addEventListener('pointerdown', (ev) => {
  if (!inRoom) return;
  if (!actx) initAudio();
  // Ignore taps on quest-action pills — they have their own handlers
  if (ev.target && ev.target.closest && ev.target.closest('#quest-actions')) return;

  // Player took an action — cancel the first-time hint
  if (firstHintPending) { clearTimeout(firstHintPending); firstHintPending = null; }

  const x = ev.clientX ?? (ev.touches && ev.touches[0].clientX) ?? 0;
  const y = ev.clientY ?? (ev.touches && ev.touches[0].clientY) ?? 0;
  spawnTapRipple(x, y);

  const chosen = chooseWispAt(x, y);

  if (chosen) {
    draggedWisp = chosen;
    pulledWisp = null;
    dragStart = { x, y };
    chosen.body.velocity.set(0, 0, 0);
    updateDragPoint(x, y);
    whisper(currentWish ? 'bring it to the ' + currentWish.label + '.' : 'bring it somewhere warm.', 2600);
    document.getElementById('room-hint').classList.remove('show');
  }
});

window.addEventListener('pointermove', (ev) => {
  if (!draggedWisp) return;
  const x = ev.clientX ?? 0;
  const y = ev.clientY ?? 0;
  updateDragPoint(x, y);
  setActiveTarget(targetAtScreen(x, y));
});

window.addEventListener('pointerup', (ev) => {
  if (!draggedWisp) return;
  const x = ev.clientX ?? 0;
  const y = ev.clientY ?? 0;
  let target = activeTarget || targetAtScreen(x, y);
  const moved = dragStart ? Math.hypot(x - dragStart.x, y - dragStart.y) : 999;
  if (!target) {
    for (const t of targetZones) {
      const dx = t.pos.x - draggedWisp.group.position.x;
      const dy = t.pos.y - draggedWisp.group.position.y;
      const dz = t.pos.z - draggedWisp.group.position.z;
      if (Math.sqrt(dx*dx + dy*dy + dz*dz) < t.radius) {
        target = t;
        break;
      }
    }
  }
  if (!target && moved < 18 && currentWish) {
    target = currentWish;
  }
  if (target) {
    placeWispInTarget(draggedWisp, target);
  } else {
    whisper(currentWish ? 'try the ' + currentWish.label + '.' : 'lamp, plant, or window.', 3200);
  }
  draggedWisp = null;
  dragStart = null;
  setActiveTarget(null);
});

const CinematicShader = {
  uniforms: {
    tDiffuse:        { value: null },
    time:            { value: 0 },
    grainStrength:   { value: 0.04 },
    vignetteStrength:{ value: 0.55 },
    chromaStrength:  { value: 0.0012 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time, grainStrength, vignetteStrength, chromaStrength;
    varying vec2 vUv;
    float rand(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123); }
    void main() {
      vec2 uv = vUv;
      vec2 center = uv - 0.5;
      float dist = length(center);
      float ca = chromaStrength * (0.4 + dist);
      float r = texture2D(tDiffuse, uv + center * ca).r;
      float g = texture2D(tDiffuse, uv).g;
      float b = texture2D(tDiffuse, uv - center * ca).b;
      vec3 color = vec3(r, g, b);
      float grain = rand(uv + fract(time)) - 0.5;
      color += grain * grainStrength;
      float vig = smoothstep(0.9, 0.2, dist);
      color *= mix(1.0 - vignetteStrength, 1.0, vig);
      gl_FragColor = vec4(color, 1.0);
    }
  `
};
const cinematicPass = new THREE.ShaderPass(CinematicShader);
cinematicPass.renderToScreen = true;
composer.addPass(cinematicPass);

// ===== Audio — rain + soft hum =====
let actx = null;
let rainGain = null, humGain = null;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Rain — filtered noise
  const buf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
  const noise = actx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1100; bp.Q.value = 0.6;
  rainGain = actx.createGain();
  rainGain.gain.setValueAtTime(0, actx.currentTime);
  rainGain.gain.linearRampToValueAtTime(0.06, actx.currentTime + 3.5);
  noise.connect(bp).connect(rainGain).connect(actx.destination);
  noise.start();

  // Warm hum — two low sines
  const osc1 = actx.createOscillator(); osc1.frequency.value = 55; osc1.type = 'sine';
  const osc2 = actx.createOscillator(); osc2.frequency.value = 110; osc2.type = 'sine';
  humGain = actx.createGain();
  humGain.gain.setValueAtTime(0, actx.currentTime);
  humGain.gain.linearRampToValueAtTime(0.025, actx.currentTime + 4);
  osc1.connect(humGain); osc2.connect(humGain);
  humGain.connect(actx.destination);
  osc1.start(); osc2.start();
}

// When a pulled wisp reaches the companion, it transforms into a tiny quest line.
// For v0.2 we hardcode a pool of tiny quests. v1 will use the Anthropic API.
const TINY_QUESTS = [
  'stand up for a minute.',
  'drink a sip of water.',
  'open the tab. nothing else.',
  'write only the title.',
  'put one thing in the laundry pile.',
  'breathe out. that\'s the whole thing.',
  'message one person. one line.',
  'step outside the door.',
];

function dissolveWisp(wisp, targetPos=null) {
  if (!wisp || !wisps.includes(wisp)) return;
  if (targetPos) {
    wisp.body.position.set(targetPos.x, targetPos.y, targetPos.z);
    wisp.group.position.copy(targetPos);
  }
  const start = performance.now();
  (function fade() {
    const t = Math.min(1, (performance.now() - start) / 520);
    const ease = 1 - Math.pow(1 - t, 3);
    wisp.group.scale.setScalar(1 + ease * 0.75);
    wisp.group.children.forEach(child => {
      if (child.material && child.material.transparent !== false) {
        child.material.opacity = (1 - t) * (child.material.opacity || 1);
      }
      if (child.isPointLight) child.intensity = 0.4 * (1 - t);
    });
    if (t < 1) requestAnimationFrame(fade);
    else {
      scene.remove(wisp.group);
      world.removeBody(wisp.body);
      const idx = wisps.indexOf(wisp);
      if (idx >= 0) wisps.splice(idx, 1);
    }
  })();
}

function placeWispInTarget(wisp, target) {
  hideQuestActions();
  dissolveWisp(wisp, target.pos);
  if (target.name === 'lamp') warmLamp();
  if (target.name === 'plant') growPlant();
  if (target.name === 'window') clearWindow();
  nextWishAfter(target);
  setTimeout(() => {
    whisper('want one tiny step?', 30000);
    showQuestActions(target.color);
  }, 900);
  scheduleNextWisp(2600);
}

function warmLamp() {
  lampWarmth = Math.min(1, lampWarmth + 0.25);
  const start = performance.now();
  const dur = 1800;
  (function pulse() {
    const t = Math.min(1, (performance.now() - start) / dur);
    const e = Math.sin(t * Math.PI);
    lampLight.intensity = 1.6 + lampWarmth * 0.6 + e * 1.4;
    lampShade.material.emissiveIntensity = 0.55 + lampWarmth * 0.35 + e * 0.8;
    lamp.rotation.z = Math.sin(t * Math.PI * 5) * 0.035 * (1 - t);
    if (t < 1) requestAnimationFrame(pulse);
    else lamp.rotation.z = 0;
  })();
  whisper('the lamp found you.', 2600);
}

function growPlant() {
  plantGrowth = Math.min(1, plantGrowth + 0.22);
  plantLeaves.forEach((leaf, i) => {
    const base = 1 + plantGrowth * 0.45;
    leaf.scale.setScalar(base + (i % 2) * 0.08);
    leaf.rotation.z += 0.12;
  });
  spawnSeed();
  whisper('the plant stretched.', 2600);
}

function clearWindow() {
  windowClarity = Math.min(1, windowClarity + 0.25);
  glass.material.opacity = Math.max(0.22, 0.55 - windowClarity * 0.25);
  rain.material.opacity = Math.max(0.16, 0.45 - windowClarity * 0.18);
  scene.fog.density = Math.max(0.048, 0.075 - windowClarity * 0.02);
  moonLight.intensity = 0.5 + windowClarity * 0.25;
  whisper('the rain stepped back.', 2600);
}

function crystallizeWisp(wisp) {
  // Burst the wisp's mesh
  for (let i = 0; i < 18; i++) {
    const angle = (i/18) * Math.PI*2;
    const speed = 0.08 + Math.random()*0.05;
    wisp.body.velocity.set(
      Math.cos(angle) * speed,
      0.15 + Math.random()*0.1,
      Math.sin(angle) * speed
    );
  }
  // Fade & remove the wisp
  const start = performance.now();
  (function fade() {
    const t = Math.min(1, (performance.now() - start) / 600);
    wisp.group.children.forEach(child => {
      if (child.material) child.material.opacity = (1 - t) * (child.material.opacity || 1);
    });
    if (t < 1) requestAnimationFrame(fade);
    else {
      scene.remove(wisp.group);
      world.removeBody(wisp.body);
      const idx = wisps.indexOf(wisp);
      if (idx >= 0) wisps.splice(idx, 1);
    }
  })();

  // Show the tiny quest line, then offer "done / not yet"
  const quest = TINY_QUESTS[Math.floor(Math.random()*TINY_QUESTS.length)];
  setTimeout(() => {
    whisper(quest, 30000); // hold the line until the player chooses
    showQuestActions(wisp.color.getHex());
  }, 700);
}

// ===== Quest actions =====
function showQuestActions(colorHex) {
  const el = document.getElementById('quest-actions');
  el.classList.add('show');
}
function hideQuestActions() {
  document.getElementById('quest-actions').classList.remove('show');
}

document.getElementById('quest-done').addEventListener('click', (ev) => {
  ev.stopPropagation();
  hideQuestActions();
  const quest = TINY_QUESTS[Math.floor(Math.random()*TINY_QUESTS.length)];
  whisper(quest, 12000);
});
document.getElementById('quest-skip').addEventListener('click', (ev) => {
  ev.stopPropagation();
  hideQuestActions();
  whisper('still here when you want.', 3500);
});

function scheduleNextWisp(delay=4500) {
  setTimeout(() => {
    if (wisps.length >= 3) return;
    const wx = -1.7 + Math.random()*3.4;
    const wy = 1.6 + Math.random()*0.6;
    const wz = -0.8 + Math.random()*1.8;
    const wc = WISP_COLORS[Math.floor(Math.random()*WISP_COLORS.length)];
    makeWisp(wx, wy, wz, wc);
  }, delay);
}

// ===== Room responds to "done" =====
// 1. Lamp pulses warmer for ~3s
// 2. A small seed accumulates on the windowsill
// 3. Companion whispers warmly
// 4. Soft chime
const seeds = [];
function roomResponds() {
  // 1. Lamp warm pulse
  const startE = lampLight.intensity;
  const pulseStart = performance.now();
  const pulseDur = 2800;
  (function lampPulse() {
    const t = Math.min(1, (performance.now() - pulseStart) / pulseDur);
    // up then down — ease in/out
    const e = Math.sin(t * Math.PI);
    lampLight.intensity = 1.6 + e * 1.2;
    lampShade.material.emissiveIntensity = 0.55 + e * 0.6;
    if (t < 1) requestAnimationFrame(lampPulse);
    else {
      lampLight.intensity = 1.6;
      lampShade.material.emissiveIntensity = 0.55;
    }
  })();

  // 2. Seed on windowsill — small persistent glow
  spawnSeed();

  // 3. Companion warm line
  const lines = ['oh. nice one.', 'mm.', '...there.', 'good.', 'soft.'];
  whisper(lines[Math.floor(Math.random()*lines.length)], 3000);

  // 4. Chime — soft warm two-note
  chimeDone();
}

function spawnSeed() {
  // Seeds accumulate on the windowsill (left side of room, under window).
  // Each seed is a small glowing icosahedron — warm amber.
  const idx = seeds.length;
  const cols = 6;
  const row = Math.floor(idx / cols);
  const col = idx % cols;
  const sx = WIN_X - WIN_W/2 + 0.18 + col * 0.24;
  const sy = WIN_Y - WIN_H/2 - 0.02 + row * 0.12;
  const sz = BACK_Z + 0.22;

  const c = new THREE.Color(0xf5d89a);
  const seed = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.06, 0),
    new THREE.MeshStandardMaterial({
      color: c, emissive: c, emissiveIntensity: 2.2,
      roughness: 0.4, flatShading: true,
    })
  );
  const seedGlow = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.12, 0),
    new THREE.MeshBasicMaterial({
      color: c, transparent: true, opacity: 0.4,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  const group = new THREE.Group();
  group.add(seed); group.add(seedGlow);
  group.position.set(sx, sy, sz);
  group.scale.setScalar(0);  // start tiny, grow in
  scene.add(group);
  seeds.push({ group, basePhase: Math.random()*Math.PI*2 });

  // Grow-in animation
  const start = performance.now();
  (function grow() {
    const t = Math.min(1, (performance.now() - start) / 800);
    const e = 1 - Math.pow(1 - t, 3);
    group.scale.setScalar(e);
    if (t < 1) requestAnimationFrame(grow);
  })();
}

function chimeDone() {
  if (!actx) return;
  // Warm two-note, never triumphant
  [392.0, 523.25].forEach((f, i) => {
    const t0 = actx.currentTime + i * 0.15;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = 'sine'; osc.frequency.value = f;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.07, t0 + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 1.2);
    osc.connect(g).connect(actx.destination);
    osc.start(t0); osc.stop(t0 + 1.3);
  });
}



// ===== Animation loop =====
let t0 = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const t = (now - t0) / 1000;
  const dt = Math.min(0.05, t - (animate.lastT || t));
  animate.lastT = t;

  // Companion drift — slow figure-8 near the desk
  const ct = t * 0.4;
  companion.position.x = 0.4 + Math.sin(ct) * 0.4;
  companion.position.y = 1.5 + Math.sin(ct * 1.7) * 0.12;
  companion.position.z = -1.5 + Math.cos(ct * 0.7) * 0.3;
  companion.rotation.y += dt * 0.6;
  compCore.rotation.x += dt * 0.3;
  // Mirror companion position to physics body so wisps know where to go
  companionBody.position.set(companion.position.x, companion.position.y, companion.position.z);

  // ---- Physics step ----
  world.step(1/60, dt, 3);

  // ---- Wisps: drift + buoyancy + attraction ----
  wisps.forEach((w) => {
    w.phase += dt * 0.9;

    // Soft buoyancy — wisps want to hover around 1.6-2.2 in y
    const targetY = 1.8 + Math.sin(w.phase) * 0.3;
    const dy = targetY - w.body.position.y;
    w.body.applyForce(new CANNON.Vec3(0, dy * 0.04, 0), w.body.position);

    // Gentle wander in x/z (sin-wave drift)
    w.body.applyForce(new CANNON.Vec3(
      Math.sin(w.phase * 1.3) * 0.008,
      0,
      Math.cos(w.phase * 0.7) * 0.008,
    ), w.body.position);

    // If THIS wisp is being dragged by the player, follow the pointer like a toy.
    if (draggedWisp === w && dragPoint) {
      const dx = dragPoint.x - w.body.position.x;
      const dy = dragPoint.y - w.body.position.y;
      const dz = dragPoint.z - w.body.position.z;
      w.body.applyForce(new CANNON.Vec3(dx * 0.35, dy * 0.35, dz * 0.35), w.body.position);
      w.group.scale.setScalar(1.18 + Math.sin(t * 5) * 0.04);
    }

    // Legacy attraction path retained for safety, but v0.4 uses drag + place.
    if (pulledWisp === w) {
      const cx = companion.position.x - w.body.position.x;
      const cy = companion.position.y - w.body.position.y;
      const cz = companion.position.z - w.body.position.z;
      const dist = Math.sqrt(cx*cx + cy*cy + cz*cz);
      if (dist > 0.001) {
        const force = 0.15 * pullStrength;
        w.body.applyForce(new CANNON.Vec3(
          (cx / dist) * force,
          (cy / dist) * force,
          (cz / dist) * force,
        ), w.body.position);
      }
      // Crystallize when close
      if (dist < 0.35) {
        dissolveWisp(w, companion.position);
        whisper('want one tiny step?', 30000);
        showQuestActions(0xf5d89a);
        scheduleNextWisp(2600);
        pulledWisp = null;
      }
    }

    // Sync mesh to physics body
    w.group.position.set(w.body.position.x, w.body.position.y, w.body.position.z);

    // Stronger breathing — wisps clearly say "tap me"
    const breath = 0.75 + Math.sin(t * 2.2 + w.phase) * 0.35;
    w.group.children[0].material.emissiveIntensity = 3.0 * breath;
    w.group.children[1].material.opacity = 0.5 * breath;
    w.group.children[2].material.opacity = 0.18 * breath;
    const dragBoost = draggedWisp === w ? 0.28 : 0;
    w.group.scale.setScalar(0.95 + dragBoost + Math.sin(t * 1.5 + w.phase) * 0.1);
    w.group.children[0].rotation.x += dt * 0.5;
    w.group.children[0].rotation.y += dt * 0.4;
  });
  // Subtle breathing in the glow
  const breath = 0.85 + Math.sin(t * 0.8) * 0.15;
  compInner.material.opacity = 0.35 * breath;
  compOuter.material.opacity = 0.12 * breath;
  compHalo.material.opacity = 0.6 * breath;

  // Lamp flicker — very subtle
  const flicker = 1.0 + Math.sin(t * 9.7) * 0.015 + Math.sin(t * 17.3) * 0.01;
  lampLight.intensity = (1.6 + lampWarmth * 0.55) * flicker;
  lampShade.material.emissiveIntensity = (0.55 + lampWarmth * 0.32) * flicker;

  // Rain — falls in z+y, recycles at top
  const rp = rain.geometry.attributes.position.array;
  for (let i = 0; i < rp.length; i += 3) {
    rp[i+1] -= 0.07;
    rp[i+2] += 0.005;
    if (rp[i+1] < WIN_Y - WIN_H/2 - 0.3) {
      rp[i+1] = WIN_Y + WIN_H * 0.8;
      rp[i+2] = BACK_Z - 0.2 - Math.random() * 2.5;
    }
  }
  rain.geometry.attributes.position.needsUpdate = true;

  // Dust motes — gentle sin-wave drift
  const dp = dust.geometry.attributes.position.array;
  for (let i = 0; i < dp.length / 3; i++) {
    dustPhase[i] += dt * 0.6;
    dp[i*3]   += Math.sin(dustPhase[i] + i) * 0.0008;
    dp[i*3+1] += 0.0005;
    dp[i*3+2] += Math.cos(dustPhase[i] * 0.7) * 0.0006;
    if (dp[i*3+1] > 3.2) dp[i*3+1] = 0.4;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  // Sky motes — very slow drift
  const sp = skyMotes.geometry.attributes.position.array;
  for (let i = 0; i < sp.length; i += 3) {
    sp[i] += 0.0005;
    if (sp[i] > 4) sp[i] = -4;
  }
  skyMotes.geometry.attributes.position.needsUpdate = true;

  // Camera — subtle breathing — feels alive without being motion-sick
  camera.position.y = 1.85 + Math.sin(t * 0.4) * 0.025;
  camera.position.x = Math.sin(t * 0.25) * 0.05;
  camera.lookAt(0, 1.4 + Math.sin(t * 0.3) * 0.04, -2);

  // Animate seeds — gentle breathing glow
  seeds.forEach((s, i) => {
    const phase = s.basePhase + t * 0.7;
    const breath = 0.85 + Math.sin(phase) * 0.15;
    if (s.group.children[0].material) s.group.children[0].material.emissiveIntensity = 2.2 * breath;
    if (s.group.children[1].material) s.group.children[1].material.opacity = 0.4 * breath;
  });

  // Target halos breathe quietly; when dragging, the active target blooms.
  targetZones.forEach((target, i) => {
    const highlighted = target === activeTarget || target === currentWish;
    const base = highlighted ? target.halo.userData.activeOpacity : target.halo.userData.baseOpacity;
    target.halo.material.opacity = base * (0.82 + Math.sin(t * 1.6 + i) * 0.18);
    if (target !== activeTarget) {
      target.halo.scale.setScalar((highlighted ? 1.22 : 1) + Math.sin(t * 1.1 + i) * 0.03);
    }
  });
  updateTargetLabels();

  cinematicPass.uniforms.time.value = t;
  composer.render();
}
animate();
</script>
