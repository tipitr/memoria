<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Night Market Memory</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #101018; color: #f4e8cb;
    font-family: ui-rounded, "Avenir Next", "Trebuchet MS", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none; user-select: none;
  }
  canvas { position: fixed; inset: 0; display: block; }

  #hud {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
  }

  #topbar {
    position: absolute; left: 14px; right: 14px; top: 12px;
    display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: start;
  }

  #order-card {
    min-height: 112px;
    padding: 13px 15px 14px;
    border-radius: 18px 18px 22px 22px;
    background:
      radial-gradient(circle at 14% 10%, rgba(255,255,255,0.42), transparent 18%),
      linear-gradient(160deg, rgba(255,238,190,0.96), rgba(226,166,101,0.94));
    border: 2px solid rgba(88, 43, 42, 0.38);
    box-shadow: 0 16px 38px rgba(0,0,0,0.32), inset 0 -6px 0 rgba(110,61,42,0.12);
    color: #382132;
  }

  #customer-name {
    font-size: 12px; color: #7a3540; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 6px;
    font-weight: 900;
  }

  #customer-line {
    font-size: clamp(15px, 2.7vw, 18px);
    line-height: 1.2; color: #382132;
    font-weight: 800;
    margin-bottom: 10px;
  }

  .icons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .icon {
    min-width: 72px; height: 58px;
    border-radius: 14px;
    display: grid; grid-template-columns: 26px 1fr; gap: 6px; align-items: center;
    padding: 6px 8px;
    font-size: 24px;
    background: rgba(55,31,44,0.12);
    border: 2px solid rgba(78,39,44,0.18);
    box-shadow: inset 0 -5px 0 rgba(0,0,0,0.08), 0 4px 0 rgba(88,43,42,0.12);
    color: #331c31;
  }
  .icon .mark { text-align: center; font-size: 25px; line-height: 1; }
  .icon .name {
    font-size: 11px;
    font-weight: 1000;
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .icon.done {
    background: rgba(122, 216, 151, 0.35);
    border-color: rgba(48, 132, 86, 0.55);
    transform: scale(0.96);
  }

  #lanterns {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px;
    border-radius: 14px;
    background: rgba(20, 15, 30, 0.64);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
  }
  .lantern-dot {
    width: 14px; height: 14px;
    transform: rotate(45deg);
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.16);
    transition: background 450ms ease, box-shadow 450ms ease, transform 450ms ease;
  }
  .lantern-dot.lit {
    background: #f8c56d;
    box-shadow: 0 0 16px #f8c56d;
    transform: rotate(45deg) scale(1.16);
  }

  #basket {
    position: absolute; left: 50%; bottom: max(16px, env(safe-area-inset-bottom)); transform: translateX(-50%);
    display: flex; gap: 8px; min-height: 52px; align-items: center; justify-content: center;
    padding: 8px 12px;
    border-radius: 24px 24px 18px 18px;
    background: linear-gradient(160deg, rgba(255,238,190,0.94), rgba(209,124,84,0.9));
    border: 2px solid rgba(88, 43, 42, 0.28);
    box-shadow: 0 14px 34px rgba(0,0,0,0.24);
  }
  #basket-label {
    font-size: 11px; color: rgba(56,33,50,0.68);
    letter-spacing: 0.16em; text-transform: uppercase; margin-right: 3px;
    font-weight: 900;
  }

  #toast {
    position: absolute; left: 50%; top: 47%; transform: translate(-50%, -50%);
    padding: 12px 18px;
    border-radius: 999px;
    background: rgba(16, 12, 22, 0.78);
    border: 1px solid rgba(255,255,255,0.14);
    color: #f7ebd0;
    font-size: clamp(15px, 3vw, 20px);
    opacity: 0; transition: opacity 220ms ease, transform 220ms ease;
    white-space: nowrap;
    box-shadow: 0 16px 44px rgba(0,0,0,0.28);
  }
  #toast.show { opacity: 1; transform: translate(-50%, -58%); }

  #hint {
    position: absolute; left: 50%; bottom: calc(max(16px, env(safe-area-inset-bottom)) + 72px);
    transform: translateX(-50%);
    color: rgba(244,232,203,0.66);
    font-size: 13px;
    text-align: center;
    text-shadow: 0 2px 14px rgba(0,0,0,0.6);
    max-width: 88vw;
  }

  #start {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    padding: 26px;
    background: radial-gradient(circle at 50% 30%, rgba(70,45,110,0.5), #101018 64%);
    transition: opacity 600ms ease;
    text-align: center;
  }
  #start.fade { opacity: 0; pointer-events: none; }
  #start h1 {
    font-size: clamp(36px, 8vw, 74px);
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: #f8c56d;
    text-shadow: 0 0 28px rgba(248,197,109,0.34);
    margin-bottom: 16px;
  }
  #start p {
    max-width: 540px;
    font-size: clamp(15px, 2.5vw, 19px);
    line-height: 1.45;
    color: rgba(244,232,203,0.78);
    margin-bottom: 28px;
  }
  #start .play {
    padding: 13px 24px;
    border-radius: 999px;
    background: #f8c56d;
    color: #221520;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 0 30px rgba(248,197,109,0.34);
  }
</style>
</head>
<body>
<div id="start">
  <h1>Night Market<br/>Memory</h1>
  <p>Run strange little orders before sunrise. Pick the right charms, ignore the shiny wrong ones, and wake the lantern tree.</p>
  <div class="play">tap to open</div>
</div>

<div id="hud">
  <div id="topbar">
    <div id="order-card">
      <div id="customer-name"></div>
      <div id="customer-line"></div>
      <div class="icons" id="order-icons"></div>
    </div>
    <div id="lanterns"></div>
  </div>
  <div id="toast"></div>
  <div id="hint">tap anywhere to move · collect the order · return to the customer</div>
  <div id="basket"><span id="basket-label">basket</span><div class="icons" id="basket-icons"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* Night Market Memory
   A real casual-game wrapper for ADHD-friendly cognitive practice.
   No clinical language in-game. The player is running a magical market. */

const ITEMS = {
  moonTea:   { name: 'moon tea',   short: 'tea',     icon: '☾', color: 0x86d7ff, shape: 'cup',   stall: 'tea' },
  blueBun:   { name: 'blue bun',   short: 'bun',     icon: '●', color: 0x7aa6ff, shape: 'bun',   stall: 'bakery' },
  starPlum:  { name: 'star plum',  short: 'plum',    icon: '✦', color: 0xe7c86a, shape: 'fruit', stall: 'fruit' },
  cloudRice: { name: 'cloud rice', short: 'rice',    icon: '◇', color: 0xf3f1dc, shape: 'bowl',  stall: 'tea' },
  foxCandy:  { name: 'fox candy',  short: 'candy',   icon: '◆', color: 0xff8e6b, shape: 'gem',   stall: 'bakery' },
  mintLantern:{name: 'mint lamp',  short: 'lamp',    icon: '✺', color: 0x7edb9a, shape: 'lamp',  stall: 'fruit' },
};
const ITEM_IDS = Object.keys(ITEMS);

const ORDERS = [
  { customer: 'Momo, umbrella ghost', line: 'Momo wants one thing. Find moon tea.', items: ['moonTea'] },
  { customer: 'Pip, alley sprite', line: 'Pip wants two things. Find star plum and cloud rice.', items: ['starPlum', 'cloudRice'] },
  { customer: 'Auntie Lantern', line: 'Auntie wants three bright snacks.', items: ['mintLantern', 'foxCandy', 'starPlum'] },
  { customer: 'The Cat With A Hat', line: 'Tea, bun, candy. Any order is fine.', items: ['moonTea', 'blueBun', 'foxCandy'] },
  { customer: 'Sleepy Moon Clerk', line: 'Last bundle before sunrise.', items: ['cloudRice', 'mintLantern', 'moonTea', 'starPlum'] },
];

let started = false;
let currentOrderIndex = 0;
let currentOrder = ORDERS[0];
let basket = [];
let delivered = 0;
let targetPoint = null;
let keys = {};
let lastToast = null;
let audioCtx = null;

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x151226);
scene.fog = new THREE.FogExp2(0x151226, 0.045);

const aspect = window.innerWidth / window.innerHeight;
const frustum = window.innerWidth < 700 ? 9.2 : 11.5;
const camera = new THREE.OrthographicCamera(
  -frustum * aspect / 2, frustum * aspect / 2,
  frustum / 2, -frustum / 2,
  0.1, 100
);
camera.position.set(0, 10.5, 8.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xa4bbff, 0x291720, 1.8));
const moon = new THREE.DirectionalLight(0xd9e7ff, 1.1);
moon.position.set(-3, 8, 4);
moon.castShadow = true;
moon.shadow.mapSize.set(1024, 1024);
scene.add(moon);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(7.6, 8),
  new THREE.MeshStandardMaterial({ color: 0x29203a, roughness: 0.9, flatShading: true })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const path = new THREE.Mesh(
  new THREE.RingGeometry(1.6, 6.2, 8, 1),
  new THREE.MeshStandardMaterial({ color: 0x38294e, roughness: 0.95, flatShading: true })
);
path.rotation.x = -Math.PI / 2;
path.position.y = 0.012;
scene.add(path);

const stalls = {
  tea:    { pos: new THREE.Vector3(-4.2, 0, -2.2), color: 0x62c4d8, label: 'tea' },
  bakery: { pos: new THREE.Vector3(4.1, 0, -2.0), color: 0xeb8f73, label: 'buns' },
  fruit:  { pos: new THREE.Vector3(0, 0, 3.8), color: 0x95d46d, label: 'charms' },
};
const itemMeshes = [];
const customerGroup = new THREE.Group();
const lanternTree = new THREE.Group();
const puffs = [];

function mat(color, opts={}) {
  return new THREE.MeshStandardMaterial({
    color,
    roughness: opts.roughness ?? 0.75,
    metalness: 0,
    emissive: opts.emissive ?? 0x000000,
    emissiveIntensity: opts.emissiveIntensity ?? 0,
    flatShading: true,
    transparent: opts.transparent ?? false,
    opacity: opts.opacity ?? 1,
  });
}

function makeCanvasSprite({ text, sub='', color=0xffffff, bg='rgba(33, 18, 35, 0.88)', w=256, h=128, fontSize=54 }) {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = bg;
  roundRect(ctx, 10, 10, w - 20, h - 20, 26);
  ctx.fill();
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(255,255,255,0.24)';
  ctx.stroke();
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.font = `900 ${fontSize}px ui-rounded, Avenir Next, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, sub ? h * 0.42 : h / 2 + 2);
  if (sub) {
    ctx.fillStyle = 'rgba(255,248,226,0.88)';
    ctx.font = '900 25px ui-rounded, Avenir Next, sans-serif';
    ctx.fillText(sub.toUpperCase(), w / 2, h * 0.74);
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: texture, transparent: true, depthWrite: false,
  }));
  sprite.userData.texture = texture;
  return sprite;
}

function setSpriteText(sprite, { text, sub='', color=0xffffff, bg='rgba(33, 18, 35, 0.88)', fontSize=54 }) {
  const texture = sprite.userData.texture;
  const canvas = texture.image;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = bg;
  roundRect(ctx, 10, 10, w - 20, h - 20, 26);
  ctx.fill();
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(255,255,255,0.24)';
  ctx.stroke();
  ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
  ctx.font = `900 ${fontSize}px ui-rounded, Avenir Next, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, sub ? h * 0.42 : h / 2 + 2);
  if (sub) {
    ctx.fillStyle = 'rgba(255,248,226,0.9)';
    ctx.font = '900 25px ui-rounded, Avenir Next, sans-serif';
    ctx.fillText(sub.toUpperCase(), w / 2, h * 0.74);
  }
  texture.needsUpdate = true;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function makeStall(data) {
  const g = new THREE.Group();
  g.position.copy(data.pos);
  const base = new THREE.Mesh(new THREE.BoxGeometry(2.25, 0.75, 1.15), mat(0x5a2e45));
  base.position.y = 0.38; base.castShadow = true; base.receiveShadow = true; g.add(base);
  const counter = new THREE.Mesh(new THREE.BoxGeometry(2.45, 0.18, 1.32), mat(0xffc66d, { emissive: data.color, emissiveIntensity: 0.05 }));
  counter.position.y = 0.83; counter.castShadow = true; g.add(counter);
  for (const x of [-0.95, 0.95]) {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.06, 1.35, 5), mat(0x382132));
    post.position.set(x, 1.34, -0.42); post.castShadow = true; g.add(post);
  }
  // Striped low-poly market awning, deliberately readable from top-down.
  for (let i = 0; i < 5; i++) {
    const stripeColor = i % 2 ? 0xffe0a3 : data.color;
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.18, 1.42), mat(stripeColor, {
      emissive: stripeColor, emissiveIntensity: i % 2 ? 0.02 : 0.12,
    }));
    stripe.position.set(-1.04 + i * 0.52, 1.66, -0.1);
    stripe.rotation.x = -0.18;
    stripe.castShadow = true;
    g.add(stripe);
  }
  const sign = makeCanvasSprite({ text: data.label, color: data.color, bg: 'rgba(42,22,46,0.92)', w: 260, h: 100, fontSize: 42 });
  sign.position.set(0, 2.15, 0.32);
  sign.scale.set(1.25, 0.48, 1);
  g.add(sign);
  const glow = new THREE.PointLight(data.color, 1.15, 4.5, 2);
  glow.position.set(0, 1.35, 0); g.add(glow);
  scene.add(g);
}
Object.values(stalls).forEach(makeStall);

// Lantern tree = visible progression, fiction-first.
lanternTree.position.set(-5.25, 0, 3.7);
const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.16, 2.0, 5), mat(0x3a221a));
trunk.position.y = 1.0; trunk.castShadow = true; lanternTree.add(trunk);
const branches = [];
for (let i = 0; i < 5; i++) {
  const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.04, 1.1, 4), mat(0x3a221a));
  branch.position.set(Math.sin(i * 1.7) * 0.34, 1.35 + i * 0.16, Math.cos(i * 1.7) * 0.25);
  branch.rotation.z = (i % 2 ? -0.8 : 0.8);
  lanternTree.add(branch);
  const lantern = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.16, 0),
    mat(0x3f3248, { emissive: 0x000000, emissiveIntensity: 0 })
  );
  lantern.position.set(branch.position.x + (i % 2 ? -0.42 : 0.42), branch.position.y + 0.1, branch.position.z);
  lantern.userData.lit = false;
  lanternTree.add(lantern);
  branches.push(lantern);
}
scene.add(lanternTree);

// Courier/player.
const player = new THREE.Group();
const body = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.62, 5), mat(0xf8c56d, { emissive: 0xf8c56d, emissiveIntensity: 0.05 }));
body.position.y = 0.46; body.castShadow = true; player.add(body);
const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.2, 0), mat(0xf1d0a0));
head.position.y = 0.88; head.castShadow = true; player.add(head);
const basketMesh = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.18, 0.28), mat(0x8a5238));
basketMesh.position.set(0.34, 0.5, 0); basketMesh.castShadow = true; player.add(basketMesh);
player.position.set(0, 0, 0);
scene.add(player);

function makeCustomer(color=0xb392e0) {
  customerGroup.clear();
  customerGroup.position.set(0, 0, -4.8);
  const robe = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.42, 0.8, 6), mat(color, { emissive: color, emissiveIntensity: 0.08 }));
  robe.position.y = 0.4; robe.castShadow = true; customerGroup.add(robe);
  const face = new THREE.Mesh(new THREE.IcosahedronGeometry(0.23, 0), mat(0xf3dec2));
  face.position.y = 0.93; face.castShadow = true; customerGroup.add(face);
  const bob = new THREE.PointLight(color, 0.5, 3.5, 2);
  bob.position.y = 1.3; customerGroup.add(bob);
  const label = makeCanvasSprite({
    text: 'ORDER',
    sub: 'customer',
    color,
    bg: 'rgba(30, 16, 34, 0.92)',
    w: 210,
    h: 126,
    fontSize: 42,
  });
  label.position.set(0, 1.65, 0);
  label.scale.set(0.9, 0.54, 1);
  label.userData.kind = 'customerLabel';
  customerGroup.add(label);
  const beacon = new THREE.Mesh(new THREE.RingGeometry(0.55, 0.68, 18), new THREE.MeshBasicMaterial({
    color: 0xf8c56d, transparent: true, opacity: 0.22, side: THREE.DoubleSide,
  }));
  beacon.rotation.x = -Math.PI / 2;
  beacon.position.y = 0.04;
  beacon.userData.kind = 'customerBeacon';
  beacon.visible = false;
  customerGroup.add(beacon);
  scene.add(customerGroup);
}
makeCustomer();

// ---------- Items ----------
function addItemPart(group, geometry, material, x, y, z, scale=[1,1,1], rotation=[0,0,0]) {
  const m = new THREE.Mesh(geometry, material);
  m.position.set(x, y, z);
  m.scale.set(scale[0], scale[1], scale[2]);
  m.rotation.set(rotation[0], rotation[1], rotation[2]);
  m.castShadow = true;
  group.add(m);
  return m;
}

function makeItemVisual(item) {
  const g = new THREE.Group();
  const main = mat(item.color, { emissive: item.color, emissiveIntensity: 0.34 });
  const dark = mat(0x2a1630);
  const light = mat(0xfff0c6, { emissive: 0xffd78a, emissiveIntensity: 0.08 });

  if (item.shape === 'cup') {
    addItemPart(g, new THREE.CylinderGeometry(0.18, 0.24, 0.38, 8), main, 0, 0.35, 0);
    addItemPart(g, new THREE.TorusGeometry(0.15, 0.025, 6, 10), light, 0, 0.59, 0, [1,1,0.55], [Math.PI/2,0,0]);
    addItemPart(g, new THREE.TorusGeometry(0.11, 0.025, 6, 10), main, 0.21, 0.38, 0, [0.7,0.7,0.7], [0,Math.PI/2,0]);
  } else if (item.shape === 'bun') {
    addItemPart(g, new THREE.SphereGeometry(0.28, 12, 6), main, 0, 0.31, 0, [1.2,0.62,1]);
    for (let i = 0; i < 3; i++) addItemPart(g, new THREE.SphereGeometry(0.035, 5, 4), light, -0.11 + i * 0.11, 0.49, -0.06 + i * 0.04);
  } else if (item.shape === 'fruit') {
    addItemPart(g, new THREE.IcosahedronGeometry(0.26, 0), main, 0, 0.35, 0);
    addItemPart(g, new THREE.ConeGeometry(0.07, 0.18, 5), dark, 0.03, 0.64, -0.01, [1,1,1], [0.5,0,0.3]);
    addItemPart(g, new THREE.IcosahedronGeometry(0.09, 0), light, -0.1, 0.43, 0.1);
  } else if (item.shape === 'bowl') {
    addItemPart(g, new THREE.CylinderGeometry(0.31, 0.2, 0.18, 9), main, 0, 0.28, 0);
    addItemPart(g, new THREE.SphereGeometry(0.23, 8, 5), light, 0, 0.43, 0, [1,0.34,1]);
    addItemPart(g, new THREE.BoxGeometry(0.5, 0.035, 0.035), dark, 0, 0.55, 0, [1,1,1], [0,0,0.18]);
  } else if (item.shape === 'gem') {
    addItemPart(g, new THREE.OctahedronGeometry(0.3, 0), main, 0, 0.36, 0);
    addItemPart(g, new THREE.BoxGeometry(0.44, 0.07, 0.07), light, 0, 0.68, 0, [1,1,1], [0,0,0.7]);
  } else {
    addItemPart(g, new THREE.CylinderGeometry(0.16, 0.22, 0.38, 7), main, 0, 0.38, 0);
    addItemPart(g, new THREE.ConeGeometry(0.16, 0.24, 7), light, 0, 0.68, 0);
    addItemPart(g, new THREE.IcosahedronGeometry(0.07, 0), main, 0, 0.86, 0);
  }

  const label = makeCanvasSprite({
    text: item.icon,
    sub: item.short,
    color: item.color,
    bg: 'rgba(30, 16, 34, 0.9)',
    w: 180,
    h: 138,
    fontSize: 54,
  });
  label.position.set(0, 1.12, 0);
  label.scale.set(0.74, 0.56, 1);
  g.add(label);

  const beacon = makeCanvasSprite({
    text: 'GET',
    sub: item.short,
    color: item.color,
    bg: 'rgba(255, 238, 190, 0.96)',
    w: 190,
    h: 118,
    fontSize: 42,
  });
  beacon.position.set(0, 1.86, 0);
  beacon.scale.set(0.78, 0.48, 1);
  beacon.visible = false;
  beacon.userData.kind = 'needBeacon';
  g.add(beacon);

  return g;
}

function spawnItems() {
  itemMeshes.forEach(m => scene.remove(m.group));
  itemMeshes.length = 0;
  ITEM_IDS.forEach((id, idx) => {
    const item = ITEMS[id];
    const stall = stalls[item.stall];
    for (let n = 0; n < 2; n++) {
      const angle = (idx * 1.9 + n * 2.7) % (Math.PI * 2);
      const r = 0.9 + n * 0.62;
      const x = stall.pos.x + Math.cos(angle) * r;
      const z = stall.pos.z + Math.sin(angle) * r;
      const group = new THREE.Group();
      group.position.set(x, 0, z);
      const visual = makeItemVisual(item);
      group.add(visual);
      const halo = new THREE.Mesh(new THREE.RingGeometry(0.28, 0.36, 10), new THREE.MeshBasicMaterial({
        color: item.color, transparent: true, opacity: 0.26, side: THREE.DoubleSide,
      }));
      halo.rotation.x = -Math.PI / 2; halo.position.y = 0.03; group.add(halo);
      group.userData.itemId = id;
      group.userData.baseY = 0;
      scene.add(group);
      itemMeshes.push({ id, group, mesh: visual, halo, cooldown: 0 });
    }
  });
}
spawnItems();

// ---------- UI ----------
function renderLanterns() {
  const el = document.getElementById('lanterns');
  el.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'lantern-dot' + (i < delivered ? ' lit' : '');
    el.appendChild(d);
  }
}

function iconEl(id, done=false) {
  const d = document.createElement('div');
  d.className = 'icon' + (done ? ' done' : '');
  const mark = document.createElement('span');
  mark.className = 'mark';
  mark.textContent = ITEMS[id].icon;
  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = ITEMS[id].short;
  d.appendChild(mark);
  d.appendChild(name);
  d.title = ITEMS[id].name;
  return d;
}

function renderOrder() {
  currentOrder = ORDERS[currentOrderIndex];
  document.getElementById('customer-name').textContent = currentOrder.customer;
  document.getElementById('customer-line').textContent = currentOrder.line;
  const icons = document.getElementById('order-icons');
  icons.innerHTML = '';
  const used = {};
  currentOrder.items.forEach((id) => {
    used[id] = used[id] || 0;
    const collected = basket.filter(x => x === id).length;
    const done = collected > used[id];
    if (done) used[id]++;
    icons.appendChild(iconEl(id, done));
  });
  renderBasket();
  renderLanterns();
  updateHint();
}

function renderBasket() {
  const icons = document.getElementById('basket-icons');
  icons.innerHTML = '';
  basket.forEach(id => icons.appendChild(iconEl(id, true)));
  updateHint();
}

function updateHint() {
  const hint = document.getElementById('hint');
  if (!started) {
    hint.textContent = 'tap to open the night market';
    return;
  }
  if (currentOrderIndex >= ORDERS.length) {
    hint.textContent = 'tap anywhere to reopen the shift';
    return;
  }
  if (basketMatchesOrder()) {
    hint.textContent = 'order ready · go back to the customer at the top';
    return;
  }
  const next = missingItemName();
  hint.textContent = 'find: ' + next + ' · look for the big GET sign in the market';
}

function toast(text, dur=1200) {
  const el = document.getElementById('toast');
  clearTimeout(lastToast);
  el.textContent = text;
  el.classList.add('show');
  lastToast = setTimeout(() => el.classList.remove('show'), dur);
}

// ---------- Audio ----------
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq=440, type='sine', gain=0.055, dur=0.25) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.04);
}

// ---------- Game logic ----------
function neededCounts() {
  const c = {};
  currentOrder.items.forEach(id => c[id] = (c[id] || 0) + 1);
  basket.forEach(id => c[id] = (c[id] || 0) - 1);
  return c;
}

function collectItem(itemObj) {
  if (itemObj.cooldown > 0) return;
  const counts = neededCounts();
  if ((counts[itemObj.id] || 0) > 0) {
    basket.push(itemObj.id);
    itemObj.cooldown = 1.2;
    createPuff(itemObj.group.position, ITEMS[itemObj.id].color, 8);
    beep(520 + basket.length * 70, 'triangle', 0.055, 0.22);
    toast(ITEMS[itemObj.id].name);
    renderOrder();
  } else {
    itemObj.cooldown = 0.55;
    wrongPickup(itemObj);
  }
}

function wrongPickup(itemObj) {
  createPuff(itemObj.group.position, 0xffffff, 12);
  itemObj.mesh.scale.setScalar(1.4);
  setTimeout(() => itemObj.mesh.scale.setScalar(1), 120);
  const lines = ['not that sparkle.', 'too shiny.', 'wrong stall. funny though.', 'the basket spits it out.'];
  toast(lines[Math.floor(Math.random() * lines.length)], 900);
  beep(180, 'square', 0.025, 0.18);
}

function basketMatchesOrder() {
  if (basket.length !== currentOrder.items.length) return false;
  const need = {};
  const have = {};
  currentOrder.items.forEach(id => need[id] = (need[id] || 0) + 1);
  basket.forEach(id => have[id] = (have[id] || 0) + 1);
  return Object.keys(need).every(id => have[id] === need[id]);
}

function missingItemName() {
  const counts = neededCounts();
  const next = currentOrder.items.find(id => (counts[id] || 0) > 0);
  return next ? ITEMS[next].name : 'the order';
}

function isItemStillNeeded(id) {
  const counts = neededCounts();
  return (counts[id] || 0) > 0;
}

function tryDeliver() {
  const dist = player.position.distanceTo(customerGroup.position);
  if (dist > 0.8) return;
  if (basketMatchesOrder()) {
    completeOrder();
  } else if (basket.length > 0 || dist < 0.58) {
    toast('still need ' + missingItemName(), 1100);
  }
}

function completeOrder() {
  delivered++;
  const lantern = branches[delivered - 1];
  if (lantern) {
    lantern.material.color.setHex(0xf8c56d);
    lantern.material.emissive.setHex(0xf8c56d);
    lantern.material.emissiveIntensity = 1.7;
    const light = new THREE.PointLight(0xf8c56d, 0.6, 3, 2);
    light.position.copy(lantern.position);
    lanternTree.add(light);
  }
  createPuff(customerGroup.position, 0xf8c56d, 24);
  beep(660, 'triangle', 0.06, 0.18);
  setTimeout(() => beep(880, 'triangle', 0.05, 0.26), 120);
  const lines = ['served warm.', 'the stall smiles.', 'lantern awake.', 'market remembers.'];
  toast(delivered >= 5 ? 'the lantern tree wakes.' : lines[(delivered - 1) % lines.length], 1500);
  basket = [];
  currentOrderIndex++;
  if (currentOrderIndex >= ORDERS.length) {
    setTimeout(endShift, 1100);
  } else {
    const colors = [0xb392e0, 0x8aa0ff, 0xe69cb8, 0x7edb9a, 0xe6b86f];
    makeCustomer(colors[currentOrderIndex % colors.length]);
    renderOrder();
    updateHint();
  }
}

function endShift() {
  document.getElementById('customer-name').textContent = 'shift complete';
  document.getElementById('customer-line').textContent = 'five lanterns awake. tap to run the market again.';
  document.getElementById('order-icons').innerHTML = '';
  toast('night market complete', 2400);
  targetPoint = null;
  updateHint();
}

function restartShift() {
  delivered = 0; currentOrderIndex = 0; basket = [];
  branches.forEach(l => {
    l.material.color.setHex(0x3f3248);
    l.material.emissive.setHex(0x000000);
    l.material.emissiveIntensity = 0;
  });
  makeCustomer();
  spawnItems();
  renderOrder();
  toast('market opens again', 1000);
  updateHint();
}

// ---------- Effects ----------
function createPuff(pos, color, count=10) {
  for (let i = 0; i < count; i++) {
    const m = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.05 + Math.random() * 0.045, 0),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.9 })
    );
    m.position.set(pos.x, 0.45 + Math.random() * 0.35, pos.z);
    m.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.06,
      0.025 + Math.random() * 0.045,
      (Math.random() - 0.5) * 0.06
    );
    m.userData.life = 1;
    scene.add(m); puffs.push(m);
  }
}

// ---------- Controls ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function setMoveTarget(clientX, clientY) {
  pointer.x = (clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hit = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(groundPlane, hit)) {
    hit.x = THREE.MathUtils.clamp(hit.x, -6.3, 6.3);
    hit.z = THREE.MathUtils.clamp(hit.z, -5.8, 5.7);
    targetPoint = hit;
    createPuff(hit, 0xf8c56d, 4);
  }
}

window.addEventListener('pointerdown', (ev) => {
  initAudio();
  if (!started) {
    started = true;
    document.getElementById('start').classList.add('fade');
    renderOrder();
    toast('find moon tea', 1100);
    updateHint();
    return;
  }
  if (currentOrderIndex >= ORDERS.length) {
    restartShift();
    return;
  }
  setMoveTarget(ev.clientX, ev.clientY);
});
window.addEventListener('keydown', ev => { keys[ev.key.toLowerCase()] = true; });
window.addEventListener('keyup', ev => { keys[ev.key.toLowerCase()] = false; });

// ---------- Loop ----------
let last = performance.now();
function animate(now=performance.now()) {
  requestAnimationFrame(animate);
  const dt = Math.min(0.033, (now - last) / 1000);
  last = now;
  const t = now / 1000;

  let move = new THREE.Vector3();
  if (keys.w || keys.arrowup) move.z -= 1;
  if (keys.s || keys.arrowdown) move.z += 1;
  if (keys.a || keys.arrowleft) move.x -= 1;
  if (keys.d || keys.arrowright) move.x += 1;
  if (move.lengthSq() > 0) {
    move.normalize().multiplyScalar(3.2 * dt);
    player.position.add(move);
    targetPoint = null;
  } else if (targetPoint) {
    const to = new THREE.Vector3(targetPoint.x - player.position.x, 0, targetPoint.z - player.position.z);
    const d = to.length();
    if (d < 0.08) targetPoint = null;
    else player.position.add(to.normalize().multiplyScalar(Math.min(d, 3.0 * dt)));
  }
  player.position.x = THREE.MathUtils.clamp(player.position.x, -6.4, 6.4);
  player.position.z = THREE.MathUtils.clamp(player.position.z, -5.9, 5.9);
  if (move.lengthSq() > 0 || targetPoint) {
    const look = targetPoint || player.position.clone().add(move);
    player.rotation.y = Math.atan2(look.x - player.position.x, look.z - player.position.z);
  }
  player.position.y = Math.sin(t * 10) * 0.025;

  itemMeshes.forEach(obj => {
    obj.cooldown = Math.max(0, obj.cooldown - dt);
    obj.group.rotation.y += dt * 0.8;
    obj.group.position.y = Math.sin(t * 2 + obj.group.position.x) * 0.045;
    const needed = started && currentOrderIndex < ORDERS.length && isItemStillNeeded(obj.id);
    const readyToDeliver = started && currentOrderIndex < ORDERS.length && basketMatchesOrder();
    obj.group.children.forEach(child => {
      if (child.userData && child.userData.kind === 'needBeacon') child.visible = needed && !readyToDeliver;
    });
    const targetScale = needed && !readyToDeliver ? 1.22 : 0.86;
    obj.group.scale.x += (targetScale - obj.group.scale.x) * 0.12;
    obj.group.scale.y = obj.group.scale.x;
    obj.group.scale.z = obj.group.scale.x;
    obj.halo.material.opacity = needed && !readyToDeliver
      ? 0.45 + Math.sin(t * 6 + obj.group.position.z) * 0.18
      : 0.08 + Math.sin(t * 2 + obj.group.position.z) * 0.03;
    if (player.position.distanceTo(obj.group.position) < 0.5) collectItem(obj);
  });
  tryDeliver();

  const readyToDeliver = started && currentOrderIndex < ORDERS.length && basketMatchesOrder();
  customerGroup.children.forEach(child => {
    if (child.userData && child.userData.kind === 'customerBeacon') {
      child.visible = readyToDeliver;
      child.material.opacity = readyToDeliver ? 0.35 + Math.sin(t * 7) * 0.18 : 0.08;
      child.scale.setScalar(readyToDeliver ? 1.12 + Math.sin(t * 5) * 0.08 : 1);
    }
    if (child.userData && child.userData.kind === 'customerLabel') {
      const state = readyToDeliver ? 'deliver' : 'order';
      if (child.userData.state !== state) {
        child.userData.state = state;
        if (readyToDeliver) setSpriteText(child, { text: 'DELIVER', sub: 'return here', color: 0xf8c56d, bg: 'rgba(30,16,34,0.94)', fontSize: 34 });
        else setSpriteText(child, { text: 'ORDER', sub: 'customer', color: 0xb392e0, bg: 'rgba(30,16,34,0.92)', fontSize: 42 });
      }
    }
  });

  customerGroup.position.y = Math.sin(t * 2.2) * 0.06;
  customerGroup.rotation.y = Math.sin(t * 1.4) * 0.2;
  lanternTree.rotation.y = Math.sin(t * 0.35) * 0.05;

  for (let i = puffs.length - 1; i >= 0; i--) {
    const p = puffs[i];
    p.position.add(p.userData.vel);
    p.userData.vel.y -= 0.0015;
    p.userData.life -= dt * 1.8;
    p.material.opacity = Math.max(0, p.userData.life);
    p.scale.multiplyScalar(1.015);
    if (p.userData.life <= 0) {
      scene.remove(p); puffs.splice(i, 1);
    }
  }

  camera.position.x += (player.position.x * 0.18 - camera.position.x) * 0.04;
  camera.position.z += ((8.5 + player.position.z * 0.08) - camera.position.z) * 0.04;
  camera.lookAt(camera.position.x * 0.35, 0, player.position.z * 0.16);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  const frustum = window.innerWidth < 700 ? 9.2 : 11.5;
  camera.left = -frustum * aspect / 2;
  camera.right = frustum * aspect / 2;
  camera.top = frustum / 2;
  camera.bottom = -frustum / 2;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

renderLanterns();
</script>
</body>
</html>
