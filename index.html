<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MEMORIA — Lethe City</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06080d; color: #d6dbe4; font-family: 'Iowan Old Style', Georgia, 'Times New Roman', serif; -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; user-select: none; }
  canvas { display: block; position: fixed; inset: 0; touch-action: none; }
  #echo {
    position: fixed;
    left: 50%; transform: translateX(-50%);
    bottom: 8vh;
    max-width: min(82vw, 540px);
    text-align: center;
    font-size: clamp(15px, 2.2vw, 19px);
    line-height: 1.55;
    letter-spacing: 0.01em;
    color: #c8d1de;
    opacity: 0;
    transition: opacity 1.4s ease;
    pointer-events: none;
    text-shadow: 0 0 24px rgba(120,160,200,0.25);
    font-style: italic;
  }
  #echo.show { opacity: 0.92; }
  #vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  #title-card {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #06080d;
    z-index: 10;
    transition: opacity 2s ease;
  }
  #title-card.fade { opacity: 0; pointer-events: none; }
  #title-card h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 300;
    letter-spacing: 0.4em;
    color: #b8c4d4;
    margin-bottom: 1em;
  }
  #title-card p {
    font-size: clamp(13px, 1.8vw, 16px);
    color: #6b7484;
    letter-spacing: 0.2em;
    font-style: italic;
  }
  #title-card .tap {
    margin-top: 4em;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: #4a5260;
    animation: breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
</style>
</head>
<body>
<div id="title-card">
  <h1>MEMORIA</h1>
  <p>i. lethe city</p>
  <div class="tap">— tap to begin —</div>
</div>
<div id="vignette"></div>
<div id="echo"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================
   MEMORIA — Chapter 1: Lethe City
   Mechanic: attend-to-sequence (Barkley: working memory, primary)
   Story: orbs are fragments of a memory the city is trying to recover.
   Player's attention lets the memory hold itself together.
   ============================================================ */

// ---------- Constants ----------
const ORBS = [
  { name: 'cyan',    color: 0x6fd9e6, freq: 523.25 },
  { name: 'violet',  color: 0xb392e0, freq: 415.30 },
  { name: 'emerald', color: 0x7ec894, freq: 329.63 },
  { name: 'amber',   color: 0xe6b86f, freq: 440.00 },
  { name: 'rose',    color: 0xe69cb8, freq: 587.33 },
];

// Adaptive difficulty: starts gentle, adjusts to player's rolling response time.
// Per clinical-advisor: aim for 70-85% success zone; respond to actual RT, not preset rounds.
const ADAPTIVE = {
  baseShowTime: 1400,   // ms per orb at start
  minShowTime: 480,
  maxShowTime: 1800,
  rtHistory: [],        // last N response times
  failHistory: [],      // last N round outcomes (1/0)
  sequenceLength: 3,    // starts at 3
};

// ---------- ECHO dialogue bank (from voice-samples.md) ----------
const ECHO_LINES = {
  open: [
    "Wait. Don't move yet. Listen.",
    "Something here remembers you.",
    "...did the wall just— no. Nothing."
  ],
  beforeFirst: [
    "I think this used to mean something.",
    "Watch. It's trying to come back.",
  ],
  successQuiet: [
    "Oh. Oh, that one stayed.",
    "It's brighter now.",
    "...you were right.",
    "", // sometimes silence is the response
    "",
  ],
  failGentle: [
    "It's okay. It slipped. They do that.",
    "I lost it too.",
    "...we can try again.",
    "It'll come back. It always does.",
  ],
  flowCurious: [
    "Have you noticed the windows here?",
    "This city used to be louder, I think.",
    "Do you ever feel like it's listening?",
  ],
  tired: [
    "...we can stop for a bit.",
    "I'm tired. Are you tired?",
  ],
  closing: [
    "I think— I think it remembered itself.",
    "That was beautiful. Was it?",
    "Look. The tower has a light now.",
  ],
};

function pickLine(bank) {
  return bank[Math.floor(Math.random() * bank.length)];
}

// ---------- Three.js scene setup ----------
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06080d, 0.025);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4.5, 11);
camera.lookAt(0, 0.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x06080d, 1);
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Lighting ----------
scene.add(new THREE.AmbientLight(0x3a4658, 0.6));
const keyLight = new THREE.DirectionalLight(0xa8c0e0, 0.4);
keyLight.position.set(5, 8, 3);
scene.add(keyLight);

// ---------- Hex platform ----------
const platform = new THREE.Group();
scene.add(platform);

function hexGrid(radius, size) {
  const tiles = [];
  for (let q = -radius; q <= radius; q++) {
    for (let r = -radius; r <= radius; r++) {
      if (Math.abs(q + r) > radius) continue;
      const x = size * 1.5 * q;
      const z = size * Math.sqrt(3) * (r + q / 2);
      tiles.push({ x, z, q, r });
    }
  }
  return tiles;
}

const tiles = hexGrid(3, 0.95);
const tileGeo = new THREE.CylinderGeometry(0.82, 0.82, 0.12, 6);
const tileMatBase = new THREE.MeshStandardMaterial({
  color: 0x1c2330,
  roughness: 0.85,
  metalness: 0.15,
  emissive: 0x0a1018,
  emissiveIntensity: 0.4,
});

tiles.forEach((t) => {
  const m = new THREE.Mesh(tileGeo, tileMatBase.clone());
  m.position.set(t.x, 0, t.z);
  m.userData.basePulse = Math.random() * Math.PI * 2;
  platform.add(m);
});

// Pulsing rings on platform
const ringGroup = new THREE.Group();
for (let i = 0; i < 4; i++) {
  const ringGeo = new THREE.RingGeometry(2.4 + i * 0.6, 2.42 + i * 0.6, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0x6890b0,
    transparent: true,
    opacity: 0.08 + i * 0.02,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.07;
  ring.userData.phase = i * 0.6;
  ringGroup.add(ring);
}
scene.add(ringGroup);

// ---------- City ruins silhouette ----------
function createRuins() {
  const ruins = new THREE.Group();
  const ruinMat = new THREE.MeshBasicMaterial({ color: 0x0c1118, fog: true });
  for (let i = 0; i < 22; i++) {
    const w = 0.6 + Math.random() * 1.4;
    const h = 2 + Math.random() * 6;
    const d = 0.6 + Math.random() * 1.0;
    const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), ruinMat);
    const angle = (i / 22) * Math.PI * 2 + Math.random() * 0.2;
    const dist = 14 + Math.random() * 6;
    box.position.set(Math.cos(angle) * dist, h / 2 - 1, Math.sin(angle) * dist);
    box.rotation.y = Math.random() * Math.PI;
    ruins.add(box);
  }
  return ruins;
}
scene.add(createRuins());

// Single tower with a window (the Chapter 1 closing image)
const towerGroup = new THREE.Group();
const towerBase = new THREE.Mesh(
  new THREE.BoxGeometry(1.4, 9, 1.4),
  new THREE.MeshBasicMaterial({ color: 0x0a0e15, fog: true })
);
towerBase.position.set(0, 3, -18);
towerGroup.add(towerBase);

const towerWindow = new THREE.Mesh(
  new THREE.PlaneGeometry(0.45, 0.6),
  new THREE.MeshBasicMaterial({ color: 0xe6b86f, transparent: true, opacity: 0.0 })
);
towerWindow.position.set(0, 5.5, -17.29);
towerGroup.add(towerWindow);
scene.add(towerGroup);

// ---------- Ambient floating debris ----------
function createDebris(count, spread, size) {
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random() - 0.5) * spread;
    pos[i*3+1] = Math.random() * 8 - 1;
    pos[i*3+2] = (Math.random() - 0.5) * spread;
    vel[i*3]   = (Math.random() - 0.5) * 0.002;
    vel[i*3+1] = 0.001 + Math.random() * 0.002;
    vel[i*3+2] = (Math.random() - 0.5) * 0.002;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.userData.vel = vel;
  const mat = new THREE.PointsMaterial({
    color: 0x8aa0c0, size, transparent: true, opacity: 0.45, sizeAttenuation: true,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  return new THREE.Points(geo, mat);
}
const debrisNear = createDebris(180, 24, 0.06);
const debrisFar = createDebris(120, 50, 0.04);
debrisFar.material.opacity = 0.25;
scene.add(debrisNear);
scene.add(debrisFar);

// ---------- Orb factory ----------
function makeOrb(colorHex) {
  const group = new THREE.Group();
  const color = new THREE.Color(colorHex);

  // Core — icosahedron
  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.32, 1),
    new THREE.MeshStandardMaterial({
      color,
      emissive: color,
      emissiveIntensity: 0.3,
      roughness: 0.4,
      metalness: 0.2,
    })
  );
  group.add(core);

  // Inner glow shell
  const innerGlow = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.5, 1),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.25,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  group.add(innerGlow);

  // Outer glow shell
  const outerGlow = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.85, 1),
    new THREE.MeshBasicMaterial({
      color, transparent: true, opacity: 0.08,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  group.add(outerGlow);

  // Sprite halo
  const haloCanvas = document.createElement('canvas');
  haloCanvas.width = haloCanvas.height = 128;
  const ctx = haloCanvas.getContext('2d');
  const grad = ctx.createRadialGradient(64, 64, 4, 64, 64, 64);
  grad.addColorStop(0, `rgba(${(color.r*255)|0}, ${(color.g*255)|0}, ${(color.b*255)|0}, 0.9)`);
  grad.addColorStop(0.4, `rgba(${(color.r*255)|0}, ${(color.g*255)|0}, ${(color.b*255)|0}, 0.2)`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 128);
  const haloTex = new THREE.CanvasTexture(haloCanvas);
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: haloTex, transparent: true, opacity: 0.0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  }));
  halo.scale.set(2.6, 2.6, 1);
  group.add(halo);

  group.userData = { core, innerGlow, outerGlow, halo, color, lit: false, baseY: 0, phase: Math.random() * Math.PI * 2 };
  return group;
}

// Position 5 orbs in a gentle arc around the platform
const orbGroup = new THREE.Group();
const orbObjects = [];
ORBS.forEach((spec, i) => {
  const orb = makeOrb(spec.color);
  const angle = (i / ORBS.length) * Math.PI * 2 - Math.PI / 2;
  const r = 2.6;
  orb.position.set(Math.cos(angle) * r, 1.2, Math.sin(angle) * r);
  orb.userData.baseY = orb.position.y;
  orb.userData.spec = spec;
  orb.userData.index = i;
  orbGroup.add(orb);
  orbObjects.push(orb);
});
scene.add(orbGroup);

// ---------- Particle burst pool ----------
const burstPool = [];
function spawnBurst(position, color) {
  const count = 24;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = position.x;
    pos[i*3+1] = position.y;
    pos[i*3+2] = position.z;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const speed = 0.04 + Math.random() * 0.06;
    vel[i*3]   = Math.sin(phi) * Math.cos(theta) * speed;
    vel[i*3+1] = Math.cos(phi) * speed;
    vel[i*3+2] = Math.sin(phi) * Math.sin(theta) * speed;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color, size: 0.12, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData = { vel, life: 1.0 };
  scene.add(pts);
  burstPool.push(pts);
}

// ---------- Web Audio ----------
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, duration = 0.4, type = 'sine', gain = 0.18) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function playFailWash() {
  // Soft, low descending wash — never harsh. Per clinical-advisor: failure ≠ punishment.
  if (!audioCtx) return;
  const freqs = [220, 196, 174.6];
  freqs.forEach((f, i) => setTimeout(() => playTone(f, 0.5, 'sine', 0.07), i * 90));
}

// ---------- ECHO display ----------
const echoEl = document.getElementById('echo');
let echoTimeout = null;
function sayEcho(text, duration = 3800) {
  clearTimeout(echoTimeout);
  if (!text) { echoEl.classList.remove('show'); return; }
  echoEl.textContent = text;
  echoEl.classList.add('show');
  echoTimeout = setTimeout(() => echoEl.classList.remove('show'), duration);
}

// ---------- Game state ----------
const state = {
  sequence: [],
  playerIndex: 0,
  awaitingInput: false,
  showingSequence: false,
  lastClickTime: 0,
  totalSuccesses: 0,
  consecutiveFails: 0,
  started: false,
};

// ---------- Lighting an orb ----------
function lightOrb(orb, intense = 1.0) {
  orb.userData.lit = true;
  orb.userData.litUntil = performance.now() + 200;
  const tween = { v: 0 };
  const target = intense;
  const start = performance.now();
  const dur = 180;
  function step() {
    const t = Math.min(1, (performance.now() - start) / dur);
    const e = 1 - Math.pow(1 - t, 3);
    orb.userData.core.material.emissiveIntensity = 0.3 + e * 1.4 * target;
    orb.userData.innerGlow.material.opacity = 0.25 + e * 0.5 * target;
    orb.userData.outerGlow.material.opacity = 0.08 + e * 0.25 * target;
    orb.userData.halo.material.opacity = e * 0.85 * target;
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

function dimOrb(orb) {
  orb.userData.lit = false;
  const start = performance.now();
  const dur = 600;
  const startE = orb.userData.core.material.emissiveIntensity;
  const startI = orb.userData.innerGlow.material.opacity;
  const startO = orb.userData.outerGlow.material.opacity;
  const startH = orb.userData.halo.material.opacity;
  function step() {
    const t = Math.min(1, (performance.now() - start) / dur);
    const e = 1 - Math.pow(1 - t, 2);
    orb.userData.core.material.emissiveIntensity = startE + (0.3 - startE) * e;
    orb.userData.innerGlow.material.opacity = startI + (0.25 - startI) * e;
    orb.userData.outerGlow.material.opacity = startO + (0.08 - startO) * e;
    orb.userData.halo.material.opacity = startH + (0.0 - startH) * e;
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

// ---------- Sequence playback ----------
function generateSequence(length) {
  const seq = [];
  for (let i = 0; i < length; i++) {
    let idx;
    // Avoid immediate repeats
    do { idx = Math.floor(Math.random() * orbObjects.length); } while (i > 0 && idx === seq[i-1]);
    seq.push(idx);
  }
  return seq;
}

async function showSequence(seq) {
  state.showingSequence = true;
  state.awaitingInput = false;
  await wait(800);
  for (const i of seq) {
    const orb = orbObjects[i];
    lightOrb(orb, 1.0);
    playTone(orb.userData.spec.freq, 0.32, 'sine', 0.16);
    await wait(ADAPTIVE.baseShowTime * 0.55);
    dimOrb(orb);
    await wait(ADAPTIVE.baseShowTime * 0.45);
  }
  state.showingSequence = false;
  state.awaitingInput = true;
  state.playerIndex = 0;
  state.lastClickTime = performance.now();
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

// ---------- Click handling ----------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();

function onPointerDown(ev) {
  if (!state.started) {
    startGame();
    return;
  }
  if (!state.awaitingInput || state.showingSequence) return;

  const x = ev.clientX !== undefined ? ev.clientX : ev.touches[0].clientX;
  const y = ev.clientY !== undefined ? ev.clientY : ev.touches[0].clientY;
  pointer.x = (x / window.innerWidth) * 2 - 1;
  pointer.y = -(y / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(pointer, camera);
  // Cast against orb groups — use cores
  const cores = orbObjects.map(o => o.userData.core);
  const hits = raycaster.intersectObjects(cores, false);
  if (hits.length === 0) return;

  const hit = hits[0].object;
  const orb = orbObjects.find(o => o.userData.core === hit);
  if (!orb) return;

  handleOrbClick(orb);
}
window.addEventListener('pointerdown', onPointerDown);

function handleOrbClick(orb) {
  const expectedIdx = state.sequence[state.playerIndex];
  const clickedIdx = orb.userData.index;

  // Visual + audio feedback regardless — every interaction is acknowledged
  spawnBurst(orb.position, orb.userData.color);
  playTone(orb.userData.spec.freq, 0.35, 'sine', 0.18);
  lightOrb(orb, 1.0);
  setTimeout(() => dimOrb(orb), 220);

  if (clickedIdx === expectedIdx) {
    // Correct
    const now = performance.now();
    const rt = now - state.lastClickTime;
    state.lastClickTime = now;
    ADAPTIVE.rtHistory.push(rt);
    if (ADAPTIVE.rtHistory.length > 12) ADAPTIVE.rtHistory.shift();

    state.playerIndex++;
    if (state.playerIndex >= state.sequence.length) {
      onSequenceComplete();
    }
  } else {
    // Wrong — narrative event, not punishment
    onSequenceFail();
  }
}

function onSequenceComplete() {
  state.awaitingInput = false;
  state.totalSuccesses++;
  state.consecutiveFails = 0;
  ADAPTIVE.failHistory.push(1);
  if (ADAPTIVE.failHistory.length > 8) ADAPTIVE.failHistory.shift();

  // ECHO reacts
  if (state.totalSuccesses === 1) {
    sayEcho(pickLine(ECHO_LINES.beforeFirst));
  } else if (state.totalSuccesses % 3 === 0) {
    sayEcho(pickLine(ECHO_LINES.flowCurious), 5000);
  } else {
    const line = pickLine(ECHO_LINES.successQuiet);
    if (line) sayEcho(line);
  }

  // Adaptive difficulty adjustment
  adjustDifficulty(true);

  // Tower window grows brighter with each success — the closing image, earned slowly
  const litness = Math.min(1, state.totalSuccesses / 9);
  towerWindow.material.opacity = litness * 0.95;

  // After ~9 successes, the chapter quietly closes
  if (state.totalSuccesses >= 9) {
    setTimeout(() => closeChapter(), 2400);
  } else {
    setTimeout(() => startNextSequence(), 2000);
  }
}

function onSequenceFail() {
  state.awaitingInput = false;
  state.consecutiveFails++;
  ADAPTIVE.failHistory.push(0);
  if (ADAPTIVE.failHistory.length > 8) ADAPTIVE.failHistory.shift();

  // Dim all orbs
  orbObjects.forEach(dimOrb);
  playFailWash();

  // ECHO is soft — quieter the more they fail (per voice-samples)
  if (state.consecutiveFails >= 3) {
    sayEcho(pickLine(ECHO_LINES.tired), 5000);
  } else {
    sayEcho(pickLine(ECHO_LINES.failGentle));
  }

  // Adaptive: back off
  adjustDifficulty(false);

  // Silent restart — no penalty, no score
  setTimeout(() => startNextSequence(), 2400);
}

function adjustDifficulty(success) {
  // Track median RT, success rate, and adjust both timing and length
  const successes = ADAPTIVE.failHistory.filter(x => x === 1).length;
  const trials = ADAPTIVE.failHistory.length;
  const successRate = trials > 0 ? successes / trials : 0.5;

  if (trials >= 3) {
    if (successRate > 0.85) {
      // Too easy — speed up gently and consider extending sequence
      ADAPTIVE.baseShowTime = Math.max(ADAPTIVE.minShowTime, ADAPTIVE.baseShowTime * 0.92);
      if (state.totalSuccesses % 3 === 0 && ADAPTIVE.sequenceLength < 5) {
        ADAPTIVE.sequenceLength++;
      }
    } else if (successRate < 0.55) {
      // Struggling — slow down, back off length
      ADAPTIVE.baseShowTime = Math.min(ADAPTIVE.maxShowTime, ADAPTIVE.baseShowTime * 1.12);
      if (ADAPTIVE.sequenceLength > 3) ADAPTIVE.sequenceLength--;
    }
  }
}

function startNextSequence() {
  state.sequence = generateSequence(ADAPTIVE.sequenceLength);
  showSequence(state.sequence);
}

// ---------- Chapter open / close ----------
function startGame() {
  initAudio();
  state.started = true;
  document.getElementById('title-card').classList.add('fade');

  setTimeout(() => sayEcho(pickLine(ECHO_LINES.open), 4500), 1400);

  // First sequence is just 1 orb (tutorial) — per ADHD design principle (always one easy first)
  setTimeout(() => {
    state.sequence = generateSequence(1);
    showSequence(state.sequence);
  }, 4500);
}

function closeChapter() {
  state.awaitingInput = false;
  // ECHO's closing line — emotional peak
  sayEcho(pickLine(ECHO_LINES.closing), 6000);

  // Camera slow drift toward the tower window
  const startPos = camera.position.clone();
  const targetPos = new THREE.Vector3(0, 5.5, 4);
  const startLook = new THREE.Vector3(0, 0.5, 0);
  const targetLook = new THREE.Vector3(0, 5.5, -17.29);
  const t0 = performance.now();
  const dur = 5500;
  function step() {
    const t = Math.min(1, (performance.now() - t0) / dur);
    const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    camera.position.lerpVectors(startPos, targetPos, e);
    const look = startLook.clone().lerp(targetLook, e);
    camera.lookAt(look);
    if (t < 1) requestAnimationFrame(step);
  }
  step();
}

// ---------- Animation loop ----------
let lastT = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastT) / 1000;
  lastT = now;

  // Orb idle motion — gentle hover
  orbObjects.forEach((orb) => {
    orb.userData.phase += dt * 0.6;
    orb.position.y = orb.userData.baseY + Math.sin(orb.userData.phase) * 0.08;
    orb.rotation.y += dt * 0.25;
    orb.rotation.x += dt * 0.13;
  });

  // Ring pulsing
  ringGroup.children.forEach((ring) => {
    ring.userData.phase += dt * 0.4;
    ring.material.opacity = 0.06 + Math.sin(ring.userData.phase) * 0.04;
  });

  // Tile gentle pulse
  platform.children.forEach((tile) => {
    if (tile.material && tile.userData.basePulse !== undefined) {
      tile.userData.basePulse += dt * 0.4;
      tile.material.emissiveIntensity = 0.4 + Math.sin(tile.userData.basePulse) * 0.12;
    }
  });

  // Debris drift
  [debrisNear, debrisFar].forEach((d) => {
    const pos = d.geometry.attributes.position.array;
    const vel = d.geometry.userData.vel;
    for (let i = 0; i < pos.length; i += 3) {
      pos[i]   += vel[i];
      pos[i+1] += vel[i+1];
      pos[i+2] += vel[i+2];
      if (pos[i+1] > 8) pos[i+1] = -1;
    }
    d.geometry.attributes.position.needsUpdate = true;
  });

  // Burst particles
  for (let i = burstPool.length - 1; i >= 0; i--) {
    const b = burstPool[i];
    const pos = b.geometry.attributes.position.array;
    const vel = b.userData.vel;
    for (let j = 0; j < pos.length; j += 3) {
      pos[j]   += vel[j];
      pos[j+1] += vel[j+1];
      pos[j+2] += vel[j+2];
      vel[j+1] -= 0.0008; // soft gravity
    }
    b.geometry.attributes.position.needsUpdate = true;
    b.userData.life -= dt * 1.2;
    b.material.opacity = Math.max(0, b.userData.life);
    if (b.userData.life <= 0) {
      scene.remove(b);
      b.geometry.dispose();
      b.material.dispose();
      burstPool.splice(i, 1);
    }
  }

  // Camera ambient sway (very subtle)
  if (state.started) {
    camera.position.x += (Math.sin(now * 0.0003) * 0.3 - camera.position.x) * 0.001;
  }

  renderer.render(scene, camera);
}
animate();
</script>
